<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Application error</title>
    <style>
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Ubuntu,
          Cantarell,
          Noto Sans,
          sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        max-width: 560px;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Application error</h1>
        <p>A client-side exception occurred. Please try again later.</p>
      </div>
    </div>
  </body>
</html>
