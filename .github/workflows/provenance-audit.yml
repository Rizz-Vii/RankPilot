name: Provenance Audit (Static)

on:
  pull_request:
    branches: [ master, main, workshop/* ]

jobs:
  provenance-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:provenance-audit
