name: Alias Usage Strict (Pre-Release)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 3 * * *"

jobs:
  alias-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run alias strict scan
        run: |
          mkdir -p artifacts
          STRICT=1 OUTPUT_FILE=artifacts/alias-usage.json npm run --silent report:alias-usage || echo "scan exit code=$?" > artifacts/alias-exit.txt
      - name: Upload alias usage artifact
        uses: actions/upload-artifact@v4
        with:
          name: alias-usage-${{ github.run_id }}
          path: artifacts/alias-usage.json
          if-no-files-found: warn
      - name: Evaluate strict results
        run: |
          node -e 'const fs=require("fs");const p="artifacts/alias-usage.json";if(!fs.existsSync(p))process.exit(0);const j=JSON.parse(fs.readFileSync(p,"utf8"));const unauthorized=j.results.filter(r=>!r.allowed);if(unauthorized.length){console.log("::error ::Unauthorized alias usage detected - review before removal");process.exit(1);} else {console.log("No unauthorized alias usages - safe to remove transitional mapping.");}'
