name: NeuroSEO Adoption Gate (Legacy – candidate for deprecation once central validation stable)
# Deprecation Notice (2025-08-15): Marked for removal after 7-day stability window of central validation (target removal on/after 2025-08-22)
# TODO(Remove-After-2025-08-22): Delete this workflow and ensure adoption prune threshold spec covered by consolidated validation workflow.

on:
  pull_request:
  push:
    branches: [master, main, workshop/**]

jobs:
  adoption:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Start dev server
        run: |
          nohup npm run dev-no-turbopack > dev.log 2>&1 &
          echo $! > dev.pid
      - name: Wait for server
        run: npx --yes wait-on@7 http://localhost:3000 --timeout 90000 --httpTimeout 45000
      - name: Run adoption prune threshold spec
        run: npm run --silent test:adoption-gate
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adoption-gate-logs
          path: dev.log
