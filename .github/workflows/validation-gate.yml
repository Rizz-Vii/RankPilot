name: Validation Gate (Central)

on:
  push:
    branches: [ master, main, workshop/** ]
  pull_request:

concurrency:
  group: validation-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: |
          nohup npm run dev-no-turbopack > dev-server.log 2>&1 &
          echo $! > dev-server.pid

      - name: Wait for http://localhost:3000
        run: npx --yes wait-on@7 http://localhost:3000 --timeout 120000 --httpTimeout 60000

      - name: Provenance strict gate
        env:
          PROV_ORIGIN: http://localhost:3000
          PROV_REQUIRE_SERVER: "1"
          PROV_STRICT: "1"
          PROV_TIMEOUT_MS: "15000"
        run: npm run -s test:provenance-gate

      - name: Table data contract
        env:
          BASE_URL: http://localhost:3000
        run: npm run -s test:table-contract

      - name: Rate-limit headers smoke
        run: npm run -s smoke:rate-limit-headers

      - name: AI adapter latency unit
        run: npm run -s test:unit:ai-adapter:latency

      - name: Upload dev server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-log
          path: dev-server.log
